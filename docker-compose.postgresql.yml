services:
  app:
    build: .
    container_name: shortlink
    environment:
      STORAGE: postgresql
      DSN: postgres://ozontech:defense@db:5432/shortlink?sslmode=disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:14
    container_name: shortlink_db
    environment:
      POSTGRES_USER: ozontech
      POSTGRES_PASSWORD: defense
      POSTGRES_DB: shortlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ozontech -d shortlink" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
